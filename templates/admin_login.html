<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Logo at the top-left -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-8 ms-auto">
                <a href="#" class="d-block p-3 text-end">
                    <img src="{{ url_for('static', filename='TenderGyan_Logo.png') }}" alt="TenderGyan Logo" class="img-fluid" style="max-height: 100px;">
                </a>
            </div>
        </div>
    </div>
        <!-- Main content with image and login form -->
    <div class="row min-vh-90 justify-content-center align-items-center"> <!-- Adjust height to avoid scroll -->
        <!-- Login Form Section -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">
            <div class="card shadow" style="width: 100%; max-width: 500px;">
                <div class="card-body">
                    <h5 class="card-title text-center mb-4">Login</h5>
                    <form action="{{ url_for('admin_login') }}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="text" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>

                        <!-- Forgot Password Link -->
                        <!-- <div class="mt-2 text-start">
                            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none" data-bs-toggle="modal" data-bs-target="#verifyUserModal">Forgot Password?</a>
                        </div> -->
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- 🟦 Forgot Password Modal -->
    <div class="modal fade" id="verifyUserModal" tabindex="-1" aria-labelledby="verifyUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="verifyUserModalLabel">
                        <i class="fas fa-user-check me-2"></i>Verify User
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="verifyUserForm">
                        <div class="mb-3">
                            <label for="verifyEmail" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="verifyEmail" name="email" placeholder="Enter your registered email" required>
                        </div>
                    </form>
                    <div id="verifyMessage" class="text-center small mt-2"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="verifyUserBtn">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('verifyUserBtn').addEventListener('click', async () => {
            const email = document.getElementById('verifyEmail').value.trim();
            const messageDiv = document.getElementById('verifyMessage');
            messageDiv.innerHTML = '';

            if (!email) 
            {
                messageDiv.innerHTML = '<span class="text-danger">Please enter an email.</span>';
                return;
            }

            try 
            {
                const response = await fetch('{{ url_for("forgot_password") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (data.success) 
                {
                    messageDiv.innerHTML = `<span class="text-success">${data.message}</span>`;
                } 
                else 
                {
                    messageDiv.innerHTML = `<span class="text-danger">${data.message}</span>`;
                }
            } 
            catch (error) 
            {
                messageDiv.innerHTML = '<span class="text-danger">Error sending request. Please try again.</span>';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
