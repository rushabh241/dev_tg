<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TenderGyan - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Logo at top-left -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-4">
                <a href="#" class="d-block p-3 text-start">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="TenderGyan Logo" class="img-fluid" style="max-height: 100px;">
                </a>
            </div>
        </div>
    </div>


    <!-- Main content (centered like login page) -->
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-6 d-flex justify-content-center align-items-center">
                <div class="card shadow" style="width: 100%; max-width: 500px;">
                    <div class="card-body">
                        <h5 class="card-title text-center mb-4">Reset Your Password</h5>
                        
                        <form id="resetForm">
                            <div class="mb-3">
                                <label for="new_password" class="form-label">New Password</label>
                                <input type="password" id="new_password" class="form-control" placeholder="Enter new password" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Reset Password</button>

                            <!-- Go Back to Login -->
                            <div class="mt-2 text-start">
                                <a href="{{ url_for('login') }}" class="text-decoration-none">Go back to Login</a>
                            </div>
                        </form>

                        <div id="message" class="text-center small mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Password Reset Script -->
    <script>
        const form = document.getElementById('resetForm');
        const token = "{{ token }}";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_password = document.getElementById('new_password').value.trim();
            const confirm_password = document.getElementById('confirm_password').value.trim();
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '';

            if (new_password !== confirm_password) {
                messageDiv.innerHTML = '<span class="text-danger">Passwords do not match!</span>';
                return;
            }

            try {
                const response = await fetch(`/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password })
                });
                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = `<span class="text-success">${data.message}</span>`;
                    form.reset();
                } else {
                    messageDiv.innerHTML = `<span class="text-danger">${data.error || 'Failed to reset password.'}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span class="text-danger">Error resetting password. Please try again.</span>';
                console.error('Error:', err);
            }
        });
    </script>

</body>
</html>
